id: chrome
name: Chrome
description: >
  Specular/envelope material paradigm. Renders an HDRI-style envelope
  gradient with animated light sweep, inset well, and chrome-silver text
  gradients. Any genome opting into this paradigm must declare its own
  envelope/well/gradient colors — chrome templates no longer carry
  specimen-color fallbacks.
requires_genome_fields:
  - envelope_stops
  - well_top
  - well_bottom
  - chrome_text_gradient
  - hero_text_gradient
  - highlight_color

badge:
  # Unified additive layout. Chrome shares the same algorithm as
  # brutalist/cellular; structural differences (text anchor, etched-seam
  # slot, half-gap rule) flow through paradigm config. Frame grows/shrinks
  # with content — no fixed target width. Typography matches the chrome
  # spatial study (tier2/genomes/chrome/_spatial_study.svg): Orbitron 8.5/700
  # for label, Orbitron 10/800 for value, proportional glyph, 4px accent rail.
  label_font_family: Orbitron
  value_font_family: Orbitron
  label_font_size: 8.5
  value_font_size: 10
  value_font_weight: 800
  glyph_size: 12
  glyph_size_compact: 0
  glyph_size_ratio: 0.6
  glyph_size_max: 12
  text_y_factor: 0.525
  text_visual_center_offset_em: 0.0
  # Equal-spacing pad. Chrome 7 produces ~110px for PYPI/v0.3.0 (close to
  # the prototype's 113×20 baseline; user accepted natural width).
  pad: 7
  # text_anchor=start with first-character x positions. Chrome's Orbitron
  # at small sizes with letter-spacing drifts visually when centered, so
  # the paradigm uses start-anchored placement matching the spatial study.
  text_anchor: start
  # Etched seam between label and value. 1px slot rendered as two hairlines
  # (dark cut + specular catch). The half-gap rule reserves pad/2 on each
  # side of the seam (3.5px at pad=7) instead of a full pad each side.
  seam_render_w: 1.0
  seam_specular_offset: 0.6
  # Smaller aesthetic floor for chrome — its identity is content-driven shrinkage.
  # Single-character X/1 chrome badges render as tight chips (40px) rather than
  # 60px blocks with visible dead space.
  min_total_width: 40
  # Bearing correction is computed DIRECTLY from per-glyph LSB/RSB extracted
  # from the Orbitron font via fonttools (see scripts/extract_font_metrics.py
  # and data/font-metrics/orbitron.json `bearings` map). The resolver calls
  # measure_text_ink_width and subtracts the visible-ink end from the
  # advance end to derive the per-text trailing bearing — no paradigm knob.
  # Replaces the interim average scalar that over- or under-corrected
  # depending on the LAST GLYPH of each label/value (Orbitron S ≠ K ≠ I
  # trailing bearings).
  label_letter_spacing_em: 0.1
  value_letter_spacing_em: 0.03

strip:
  value_font_size: 17
  value_font_family: Orbitron
  # Chrome strip label typography matches chrome badge label (Orbitron
  # 9/700/0.1em with --dna-signal fill). This keeps badge and strip
  # typography visually cohesive.
  label_font_size: 9
  label_font_family: Orbitron
  divider_render_mode: gradient
  status_shape_rendering: geometricPrecision
  # Cell-layout measurement params — must mirror chrome-defs.j2:57-66.
  label_font_weight: 700
  label_letter_spacing_em: 0.1
  value_font_weight: 900
  value_letter_spacing_em: 0.02
  # Identity typography matches chrome badge label (Orbitron 11/700/0.1em).
  # Resolver measures with these exact values so first_divider_x matches
  # rendered identity text width.
  identity_font_family: Orbitron
  identity_font_size: 11
  identity_font_weight: 700
  identity_letter_spacing_em: 0.1
  # Strip glyph size is computed from strip_height * strip_glyph_ratio
  # (default ratio 0.346 → 18px at strip_height=52). v0.3.9 deletes the
  # hand-synced ``glyph_size: 22`` field that had to stay in proportional
  # agreement with brutalist's ``identity_glyph_size: 18``. Both paradigms
  # now derive their identity glyph from the same ratio, so changing the
  # design intent updates both uniformly. See ParadigmStripConfig.strip_glyph_ratio.
  cell_pad: 20
  cell_min_width: 106
  # Pinned strip height (v0.3.9 additive layout). Canvas WIDTH adapts to
  # content; height stays at 52 regardless of metric count.
  strip_height: 52
  # v0.3.9 minimum strip width: prevents 1-metric chrome strips from
  # aspect-warping in README columns (a 213-wide strip in a 1000-wide column
  # scales 4.7× → visually appears 2.5× taller than a 4-metric strip in the
  # same column). 320 is wide enough that 1-metric and 4-metric strips render
  # within the same display-height band.
  strip_min_width: 320

chart:
  viewport_x: 80
  viewport_y: 160
  viewport_w: 750
  viewport_h: 250
  identity_font_family: Orbitron
  identity_font_size: 11
  identity_font_weight: 700
  identity_letter_spacing_em: 0.1
  y_tick_target: 4
  label_collision_font_family: Orbitron
  label_collision_font_size: 8.5
  label_collision_font_weight: 700
  label_collision_letter_spacing_em: 0.14
  axis_y_label_x_offset: -8
  axis_y_label_y_offset: 3
  x_axis_label_y: 442
  milestone_label_y_offset: -24
  header_identity_gap: 12
  header_identity_max_right_margin: 24

stats:
  card_height: 260
  embeds_chart: true
  metric_layout_mode: chrome_columns
  metric_value_font_family: Orbitron
  metric_value_font_size: 20
  metric_value_font_weight: 900
  metric_value_letter_spacing_em: 0.01
  metric_value_budget: 112
  metric_label_font_family: JetBrains Mono
  metric_label_font_size: 7
  metric_label_font_weight: 700
  metric_label_letter_spacing_em: 0.22
  activity_bar_baseline_y: 222
  activity_bar_max_h: 35
  activity_bar_min_h: 2
  activity_bar_w: 7
  activity_bar_start_x: 22.0
  activity_bar_stride: 8.706
  activity_bar_opacity_min: 0.72
  activity_bar_opacity_max: 0.72
  # Identity typography matches the chrome badge label slot. The resolver
  # measures with these values and chrome-defs.j2 consumes them directly.
  identity_font_family: Orbitron
  identity_font_size: 8.5
  identity_font_weight: 700
  identity_letter_spacing_em: 0.1
  embed_viewport_x: 240
  embed_viewport_y: 170
  embed_viewport_w: 220
  embed_viewport_h: 70

icon:
  supported_shapes: [square, circle]
  default_shape: circle
  # Internal viewBox = 108 (the v2 specimens' tuned coordinate system, trimmed
  # of excess padding) while rendered width/height stays at 64. The material
  # stack is unchanged — specimen r=46/r=42 bezel, 96×96 card, 6-unit rail,
  # 0.6-unit hairlines — but the frame now fills the box at the same ~85-89%
  # the other genomes do (automata 100%, brutalist 94%) instead of floating in
  # a 120-unit field at 77-80%. 108 keeps the bevel's 8% filter bleed (7.68u)
  # inside the 6-8u margins; group origins recenter in the resolver
  # (chrome_circle_group 54, chrome_square_group 6). shape-rendering:
  # geometricPrecision keeps the subpixel hairlines (0.6-unit → 0.36px)
  # anti-aliasing as fine machined edge rather than visual bug.
  viewbox_w: 108
  viewbox_h: 108

marquee:
  # v0.3.12 — reconciled to marquee-dense-chrome.svg (800×44): a dense scroll
  # band with a LIVE wordmark + pulsing diamond in the left inset. The prototype
  # stacks each metric as a SMALL label (y=15) over a bold value (y=31) — the
  # instrument-panel "module" grammar, NOT an inline ribbon. v0.3.12-fix sets
  # item_layout=module (it was previously unset → silently fell through to the
  # inline ribbon, which is what shipped). Orbitron 11px value / 6px label,
  # 0.18em tracking. The prototype has NO inter-cell dividers (only the single
  # LIVE-panel rule at x=82, rendered by the liveness overlay), so
  # module_divider_w=0 — modules read as spaced stacked cells.
  item_layout: module
  width: 800
  height: 44
  font_size: 11
  label_font_size: 6
  font_weight: "900"
  # Value-row tracking (0.06em) matches the prototype's .mq-v-* classes; the
  # label row tracks wider (module_label_letter_spacing=0.18em, like .mq-label).
  letter_spacing: "0.06em"
  font_family: "Orbitron, 'Space Grotesk', system-ui, sans-serif"
  # Module stacked-cell geometry (prototype: label baseline y=15, value y=31 in
  # the 44-tall band). Orbitron for both rows (chrome marquee embeds Orbitron
  # only); the small 6px label tracks at 0.18em like the prototype's mq-label.
  # divider_w=0 → no inter-cell rule (prototype spaces cells; the only rule is
  # the LIVE-panel separator drawn by the overlay). hero cell bumps to 13px.
  hero_font_size: 13
  module_label_font_size: 6
  module_label_y: 15
  module_value_y: 31
  module_label_letter_spacing: "0.18em"
  module_text_inset: 14
  # Prototype cell pitch ≈ 89px (892px scroll ÷ 10 cells). 90 matches that
  # density (vs the prior over-spaced clamp) while keeping a short one-item
  # marquee's repeated period above the 800px viewport floor for a seamless loop.
  module_min_width: 90
  module_divider_w: 0
  module_divider_y: 6
  module_divider_h: 32
  # Separator fields drive the RIBBON path used for FREE-TEXT chrome marquees
  # (data marquees use the stacked module + its own dividers). The chrome family
  # middle-dot (·) at the accent tone, instead of the resolver's ■ default.
  separator_color: "#60E0FF"
  separator_kind: glyph
  separator_glyph: "·"
  # Every scroll item uses the chrome-text gradient (#5A8AAA→…→#FFFFFF→…→
  # #5A8AAA). The gradient itself lives in marquee-horizontal/chrome-defs.j2
  # under id "{{ uid }}-ct"; the resolver constructs the full url(#…) string.
  text_fill_mode: gradient
  text_fill_gradient_id: ct
  # Scroll-track clip: exclude the 4px chrome bezel (right/top/bottom) so
  # scrolling text disappears under the bezel instead of rendering on top of
  # it. v0.3.12 — the LEFT inset (92) reserves the decorative LIVE + diamond
  # panel (chrome-overlay.j2) so modules scroll in past it. rx=2.6 matches the
  # well rect's rx for a clean clip boundary.
  clip_inset_left: 92
  clip_inset_right: 4
  clip_inset_top: 4
  clip_inset_bottom: 4
  clip_rx: 2.6
