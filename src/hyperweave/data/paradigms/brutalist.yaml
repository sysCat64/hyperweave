id: brutalist
name: Brutalist
description: >
  Flat plate, class-based separators, sharp geometric typography.
  Used by brutalist's stats/chart frames (and by any future
  flat-matte genome). No chrome-material requirements.
requires_genome_fields: []

badge:
  label_font_family: JetBrains Mono
  value_font_family: JetBrains Mono
  label_font_size: 11
  value_font_size: 11
  value_font_weight: 700
  # Glyph size derives from badge height so all 20px badge paradigms carry the
  # same provider-glyph visual weight.
  glyph_size: 12
  glyph_size_compact: 0
  glyph_size_ratio: 0.6
  glyph_size_max: 12
  # v0.3.3: indicator geometry calibrated to the v16 dark-badge matrix
  # prototype. 10×10 outer ring + 6×6 inner bit at offset 2; stroke-width
  # 1.5 (heavier than chrome's 0.5 diamond ring). The 10-px size anchored
  # at ind_pad_r=10 places the right edge at total_w-10 → indicator_x=138
  # for a 158-px badge, byte-matching the prototype's translate(138,5).
  # Inner-bit ratio 0.6 yields a 6×6 bit (10 * 0.6 = 6), heavier-feeling
  # than the previous 0.5 default (which gave 4×4 on an 8-px indicator).
  indicator_size: 10
  indicator_pad_r: 5
  indicator_stroke_width: 1.5
  indicator_inner_bit_ratio: 0.6
  # v0.3.3 uniform-rhythm contract: every interior gap (accent→glyph or
  # accent→label, glyph→label, label→seam, seam→value, value→indicator,
  # indicator→right border) lands at exactly 5px. The layout engine reads
  # rhythm_gap and derives label_start padding, label_pad_r, val_pad_l, and
  # glyph_gap from it; the uppercase shy-from-seam 6px adjustment is bypassed.
  # 5px favors information density over breathing room — badges are
  # inline-dense artifacts where the 8px target read as too airy. Template
  # letter-spacing values must be declared here too so measure_text reserves
  # the actual rendered width (the value template uses 0.04em; the label
  # uses 0.06em).
  rhythm_gap: 5
  label_letter_spacing_em: 0.06
  value_letter_spacing_em: 0.04
  # v0.3.9 equal-spacing rule (compute_badge_zones): single pad applied
  # between every PRESENT zone; absent zones collapse fully. Matches the
  # rhythm_gap value above so brutalist badge geometry is preserved across
  # the rhythm_gap → pad migration. The two fields are independent; pad
  # is the new code path's input.
  pad: 5

strip:
  value_font_size: 18
  value_font_family: Barlow Condensed
  label_font_size: 7
  label_font_family: JetBrains Mono
  divider_render_mode: class
  status_shape_rendering: crispEdges
  # Cell-layout measurement params — must mirror brutalist-defs.j2 CSS
  # classes. Brutalist strip grammar uses 18px Barlow Condensed serif
  # numerals at weight 900 with -0.03em tracking (per the v0.3.2 brutalist
  # strip prototypes).
  label_font_weight: 800
  label_letter_spacing_em: 0.25
  value_font_weight: 900
  value_letter_spacing_em: -0.03
  cell_pad: 0
  cell_min_width: 100

  # v0.3.2 Phase C: brutalist strip grammar geometry. owns_strip: true tells
  # the parent strip.svg.j2 to defer body composition to
  # brutalist-{dark,light}-content.j2 — those partials render brand panel +
  # triple divider + ornament + metric cells + bookend themselves. Geometry
  # values from the v0.3.2 brutalist strip prototypes (560×52 celadon panel);
  # identical layout reused across all 12 brutalist variants. Other paradigms
  # (chrome / cellular / default) leave owns_strip at the schema default
  # (False) and continue using the shared zone pipeline.
  owns_strip: true
  brand_panel_x: 6
  brand_panel_width: 156
  triple_divider_x: 162
  triple_divider_bar_width: 3
  triple_divider_void_width: 2
  # ornament_size controls the right-edge BOOKEND ornament (the empty-square
  # status indicator placeholder rendered in brutalist-{dark,light}-content.j2
  # lines 110-117). The LEFT identity glyph is sized separately by the
  # paradigm-shared ``strip_glyph_ratio`` (default 0.346 → 18px at
  # strip_height=52). Both paradigms (chrome + brutalist) now derive their
  # identity glyph from the same ratio so changes to design intent update
  # uniformly without per-paradigm re-tuning.
  ornament_x: 22
  ornament_y: 19
  ornament_size: 14
  ornament_inner_inset: 3
  bookend_x: 520
  brand_divider_x: 170
  metric_cell_width: 100
  metric_label_y: 17
  metric_value_y: 36
  identity_text_x: 50
  identity_text_y: 30
  # strip_width removed v0.3.9 — canvas now adapts to content via additive
  # slot assembly. bookend_x snaps dynamically to the right edge of the
  # last cell in compose/resolver.py.

chart:
  # v0.3.2 visual review: viewport aligned to prototype pigment panel
  # (the v0.3.2 brutalist dark chart prototype line 441) — Y-axis at x=90,
  # X-axis y=388, chart area 90→857 × 140→388. Pre-fix used (80,150,
  # 760,245) which drifted the axis rails 10px left and grid 5px high.
  viewport_x: 90
  viewport_y: 140
  viewport_w: 767
  viewport_h: 248
  y_tick_target: 4
  label_collision_font_family: JetBrains Mono
  label_collision_font_size: 9
  label_collision_font_weight: 800
  label_collision_letter_spacing_em: 0.12
  axis_y_label_x_offset: -8
  axis_y_label_y_offset: 4
  x_axis_label_y: 420
  milestone_label_y_offset: -10

stats:
  card_height: 280
  embeds_chart: false
  metric_layout_mode: brutalist_grid
  metric_value_font_family: JetBrains Mono
  metric_value_font_size: 20
  metric_value_font_weight: 700
  metric_value_letter_spacing_em: 0.0
  metric_value_budget: 112
  activity_bar_baseline_y: 246
  activity_bar_max_h: 26
  activity_bar_min_h: 4
  activity_bar_w: 7
  activity_bar_start_x: 22
  activity_bar_stride: 9
  activity_bar_opacity_min: 0.43
  activity_bar_opacity_max: 0.93
  activity_bar_opacity_min_light: 0.28
  activity_bar_opacity_max_light: 0.75
  # Username header layout. ``identity_zone_width`` is derived as
  # ``bio_x - identity_x - identity_padding = 134 - 44 - 20 = 70`` instead
  # of carried as an independent magic number. bio_x includes breathing
  # margin after clamped usernames, and the derivation absorbs that spacing
  # without per-paradigm re-tuning.
  identity_x: 44
  bio_x: 134
  identity_padding: 20
  # Adaptive bio_x: bio sits at identity_x + identity_ink_width +
  # identity_breathing_margin. For ELI64S (short, ~52px ink): bio at x=104
  # (tight v0.3.8 feel). For clamped long identity (zone_w=70): bio at
  # x=122 (matches v0.3.8 hardcoded value exactly). bio_x:134 above acts
  # as the ceiling — bio never extends past it.
  identity_breathing_margin: 8
  # Identity measurement matches brutalist-defs.j2 CSS (.{{uid}}-u) exactly.
  # JBMono 11/800/0.22em renders ~95px for 9-char names vs Inter 13/700/0's
  # 65px, so resolver measurement must use the rendered font.
  identity_font_family: JetBrains Mono
  identity_font_size: 11
  identity_font_weight: 800
  identity_letter_spacing_em: 0.22
  identity_text_transform: uppercase

icon:
  supported_shapes: [circle, square]
  default_shape: square

marquee:
  # Specimen: brutalist-marquee-v1.svg (720×32). Flat slab with 4px
  # emerald accent bar; pure scroll band — no LIVE label panel after v0.2.16.
  width: 720
  height: 32
  # JetBrains Mono at 12px/800 with 0.28em tracking. Mono + tight tracking
  # is the brutalist voice (CTA scroll band) per the specimen's Page 9
  # extraction.
  font_size: 12
  font_weight: "800"
  letter_spacing: "0.28em"
  font_family: "JetBrains Mono, 'SF Mono', Consolas, ui-monospace, monospace"
  # Brutalism's K-override forbids physics-inspired separator glyphs; the
  # specimen uses a 6×6 emerald square as a hard "bullet" between items.
  separator_kind: rect
  separator_size: 6
  # separator_color is the FALLBACK; the marquee template wraps this in
  # var(--dna-signal, separator_color) — variant overrides cascade through
  # --dna-signal automatically, the hex below is only the resolution fallback
  # for renderers that don't honor CSS variables (Quick Look, some Slack
  # previewers). Don't replace with var() — would double-wrap into
  # var(--dna-signal, var(--dna-signal)).
  separator_color: "#10B981"
  # Items rotate through [ink, info, ink, info, …] colors per position —
  # the two-stop chromatic hierarchy (substrate vs info stops). Use CSS
  # var() references (NOT hardcoded hex) so per-variant overrides flow
  # through: carbon's text cycles cool gray-purple, pulse cycles paper +
  # gold, etc. Hardcoded hex was the v0.3.2 emerald-bleed bug class —
  # base genome's emerald #D1FAE5/#34D399 baked into every variant's
  # marquee regardless of variant_overrides.
  text_fill_mode: cycle
  # v0.3.2 regression fix: was ["var(--dna-ink-bright)", "var(--dna-signal)"] —
  # but ink_bright for dark variants resolves to the DARK surface color (e.g.,
  # celadon ink_bright=#06140C = surface_0), making marquee text dark-on-dark
  # invisible. Switched to ink_primary which carries the polarity-correct
  # text color per variant (paper-bright on dark substrates, dark-ink on
  # light substrates). Restores v0.3.1 celadon legibility AND adds light-
  # variant correctness across all 12 brutalist variants.
  text_fill_cycle: ["var(--dna-ink-primary)", "var(--dna-signal)"]
  # Scroll-track clip: exclude the 4px emerald accent bar (left) and the 1px
  # perimeter stroke (right/top/bottom). Sharp corners (rx=0) match the
  # brutalist K-override (no rounded geometry).
  clip_inset_left: 4
  clip_inset_right: 1
  clip_inset_top: 1
  clip_inset_bottom: 1
  clip_rx: 0
