id: cellular
name: Cellular
description: >
  Compositional chromatic paradigm used by the `automata` genome. Sixteen
  tone primitives (violet, teal, bone, steel, amber, jade, magenta, cobalt,
  toxic, solar, abyssal, crimson, sulfur, indigo, burgundy, copper) ship as
  solo variants. Pairing happens at
  request time via the URL grammar modifier ?variant=primary&pair=secondary
  — any solo tone composes with any other solo tone. Templates consume a
  structured cellular_palette dict (primary, secondary, bridge, is_paired)
  supplied by compose/palette.py.

  Solo variants (no pair param) mirror primary into secondary so bifamily
  templates branch-free render single-tone artifacts. Paired variants
  populate both tones; the 4-key bridge dict is synthesized from each
  tone's cellular_cells[0:2] for the dissolve divider. Each tone declares
  a 14-field chromatic shape (rim_stops, cellular_cells, area_tiers,
  chart_levels, dormant_range, label_slab, seam_mid, label_text, value_text,
  canvas_top, canvas_bottom, info_accent, mid_accent, header_band);
  validated by validate_genome_variants at load.

  Cellular-pulse animation timings + state palette stay required at the
  paradigm level — they're shape-independent of the tone refactor.

requires_genome_fields:
  - cellular_pulse_base_duration
  - cellular_pattern_opacity
  - state_passing_core
  - state_passing_bright
  - state_warning_core
  - state_warning_bright
  - state_critical_core
  - state_critical_bright
  - state_building_core
  - state_building_bright
  - state_offline_core
  - state_offline_bright

frame_variant_defaults:
  badge: teal
  icon: teal
  strip: teal
  marquee-horizontal: teal
  divider: teal
  stats: teal
  chart: teal

badge:
  default_size: compact
  label_font_family: Orbitron
  value_font_family: Chakra Petch
  label_font_size: 9
  value_font_size: 12
  value_font_weight: 700
  label_letter_spacing_em: 0.1
  show_indicator: true
  frame_height: 32
  frame_height_compact: 20
  glyph_size: 12
  glyph_size_compact: 10
  glyph_size_ratio: 0.6
  glyph_size_compact_ratio: 0.5
  glyph_size_max: 12
  text_y_factor: 0.656
  # Cellular renders a left bookend pattern. Layout positions the first
  # content zone from the rendered pattern edge, not an inverse glyph offset,
  # so compact can tighten the bookend→glyph gap without changing the rest of
  # the badge pad rhythm.
  left_adornment_width: 20
  left_adornment_width_compact: 14
  left_adornment_gap: 4
  glyph_label_gap: 4
  visual_gap: 4
  left_adornment_start_x: 2
  left_adornment_start_y: 2
  left_adornment_cols: 3
  left_adornment_rows: 4
  left_adornment_cell_w: 6
  left_adornment_cell_h: 7
  left_adornment_cell_w_compact: 4
  left_adornment_cell_h_compact: 4
  # Cellular paints a 1px gradient seam at lp_w (template lines 60-61),
  # not the brutalist 2px separator. Override sep_w so the resolver's
  # value_zone_left lines up with the cellular template's actual value
  # slab — without this, value_x lands 1.5px right of slab center.
  sep_w: 1
  # Inner canvas at x=2..width-2 (cellular-content.j2:9) shrinks the
  # effective value slab right edge by 2px. Without this override,
  # value_zone_right lands 2px past the slab edge and the centered
  # value text drifts 1px right.
  right_canvas_inset: 2
  # v0.3.10 visual rhythm: the rendered bookend makes the compact badge read
  # too airy when the old 8px advance-box pad drives every gap. visual_gap=4
  # balances bookend/glyph/label/seam/value/right-edge using ink bounds, while
  # pad remains the legacy fallback for non-visual layout paths.
  pad: 8
  # Glyph y aligns to the label visual center in compose/layout.py; no
  # template-side or per-size vertical compensation is needed.
  glyph_y_offset: 0.0

strip:
  # Specimen cellular-automata-strip-v10.svg is 48px tall (not 52px default).
  strip_height: 48
  value_font_family: Chakra Petch
  value_font_size: 16
  label_font_family: JetBrains Mono
  label_font_size: 5.5
  # Identity zone: Orbitron 8px 700 0.14em per specimen.
  # Resolver measures with these exact values so first_divider_x matches
  # actual render width.
  identity_font_family: Orbitron
  identity_font_size: 8
  identity_font_weight: 700
  identity_letter_spacing_em: 0.14
  # Subtitle under identity: "eli64s/readme-ai" in JBMono 6.5px.
  show_subtitle: true
  subtitle_font_family: JetBrains Mono
  subtitle_font_size: 6.5
  subtitle_letter_spacing_em: 0.04
  # Icon box — 28x28 frame at flank_end + 8px padding, glyph inset 6px inside.
  show_icon_box: true
  icon_box_size: 28
  icon_box_pad: 8
  divider_render_mode: class
  status_shape_rendering: geometricPrecision
  show_status_indicator: true
  flank_width: 36
  flank_cell_size: 12
  # Cell layout inherits the default centered alignment from
  # ParadigmStripConfig (metric_text_anchor=middle, metric_text_x=0) —
  # cellular has no reason to diverge from brutalist/chrome on
  # alignment, since centered metrics read as the canonical strip
  # vocabulary across all three paradigms.
  #
  # Cell width sizing IS paradigm-specific: every parameter that
  # affects rendered pixel width (family, size, weight, letter-spacing)
  # must be declared so compute_cell_layout sizes cells to render-truth.
  # Mirror cellular-defs.j2:17 EXACTLY — letter-spacing:0.22em, no
  # font-weight declared (browser default 400). If the CSS class adds
  # letter-spacing, that value MUST appear here too — otherwise long
  # labels (DOWNLOADS, COMMITS) bleed past the right divider.
  label_font_weight: 400
  label_letter_spacing_em: 0.22
  value_font_weight: 700
  value_letter_spacing_em: 0.0
  cell_pad: 20
  cell_min_width: 0

icon:
  supported_shapes: [square]
  default_shape: square
  # v0.3.0 cellular icon refresh — 48×48 canvas with 5×5 living cell grid.
  # Replaces the prior 64×64 4×4-grid form. Cell geometry pulled out of the
  # template into paradigm config so dimension changes don't require template
  # edits and render/glyphs.py reads glyph_size + glyph_inset from one source.
  card_width: 48
  card_height: 48
  cell_grid_cols: 5
  cell_grid_rows: 5
  cell_size: 8
  cell_gap: 1
  cell_rx: 1
  inner_canvas_inset: 10.08
  inner_canvas_size: 27.84
  inner_canvas_rx: 4
  glyph_inset: 13.44
  glyph_size: 21.12
  outer_border_rx: 6

marquee:
  # v0.3.0 cellular marquee refresh — 800×32 monofamily strip with mid_accent
  # hairlines (top + bottom) and info_accent scroll text. Replaces the prior
  # bifamily teal/amethyst tspan_palette: paired variants no longer split
  # bifamily on the marquee — the hairlines are 0.5px at 0.2 opacity, too
  # subtle for a chromatic split to register, so the marquee adopts the
  # primary tone's mid_accent and lets paired-variant signature express
  # through scroll text + cell colors in other frames.
  width: 800
  height: 32
  font_size: 11
  font_weight: "700"
  font_family: "Orbitron, sans-serif"
  letter_spacing: "0.18em"
  # Separator glyph between scroll items. Cellular specimen uses diamonds (◆)
  # at 5px sized (smaller than scroll text), filled with mid_accent (resolver
  # routes the tone-specific value; this default is the v0.3.0 amber prototype's
  # mid stop, only used when resolver fallback fires).
  separator_glyph: "◆"
  separator_color: "#B89800"
  # Cellular always renders without a LIVE label panel; v0.2.16 deleted the
  # LIVE-block infrastructure entirely so this is now the universal default.
  # Scroll-track clip: exclude the 0.5px top and bottom hairlines (no left/
  # right rails to avoid). Hairlines are subtle but the clip prevents text
  # from sitting visibly on top of them.
  clip_inset_left: 0
  clip_inset_right: 0
  clip_inset_top: 1
  clip_inset_bottom: 1
  clip_rx: 0

chart:
  # v0.3.0 cellular chart refresh — 680×380 canvas with deliberate HUD-style
  # header band (y=0..64) housing repo identifier, "STAR HISTORY" title, and
  # hero metric. Chart viewport at (72, 80) size 580×246. Cell stride 19
  # (cell width 18, 1px gap) yields a 30-col × 13-row grid in the chart area.
  viewport_x: 72
  viewport_y: 80
  viewport_w: 580
  viewport_h: 246
  chart_width: 680
  chart_height: 380
  cell_size: 19
  header_band_height: 64
  y_tick_target: 6
  label_collision_font_family: JetBrains Mono
  label_collision_font_size: 8
  label_collision_font_weight: 700
  label_collision_letter_spacing_em: 0.0
  axis_y_label_x_offset: -10
  axis_y_label_y_offset: 4
  x_axis_label_y: 348
  milestone_label_y_offset: -24
  # One-shot stroke-dashoffset draw animation on the polyline. Cellular
  # specimen renders the data line as an arriving signal rather than a
  # printed plot; gated by prefers-reduced-motion at the CSS layer.
  line_animate: true

stats:
  # v0.3.0 cellular stat card refresh — 530×233 compact form with 3 vertical
  # zones (header band 39px, inline metric strip, heatmap+legend+langbar).
  # Replaces the prior 495×295 5-slot layout. Single-row metric strip uses
  # 4 hierarchy classes (.mvh hero, .mvm medium, .mvs small, .mvg streak/green).
  # Heatmap is 7×42 with square 11.080×11.080 cells (1.2px gap). Card outline
  # at rgba(info_accent, 0.10) frames the composition.
  card_width: 530
  card_height: 233
  embeds_chart: false
  metric_layout_mode: cellular_inline
  metric_value_font_family: Chakra Petch
  metric_label_font_family: JetBrains Mono
  metric_label_font_size: 6.5
  metric_label_font_weight: 500
  metric_label_letter_spacing_em: 0.22
  cellular_metric_value_font_family: Chakra Petch
  cellular_metric_y: 72.8
  cellular_metric_left_x: 20
  cellular_metric_right_margin: 20
  cellular_metric_value_label_gap: 4
  cellular_metric_inter_slot_gap: 12
  header_band_height: 39
  heatmap_rows: 7
  heatmap_cols: 40
  heatmap_cell_size: 11.080
  heatmap_cell_gap: 1.2
  heatmap_zone_height: 84.76
  # Username header layout. v0.3.9 Bug #1 follow-up: bio_x is the ADAPTIVE
  # CEILING (only fires when identity is so long it would push bio off the
  # card). Post-Bug-A the HYPERWEAVE branding moved from the header right
  # zone (was at sw-20 y=22) to the footer (y=221), so the header right is
  # now entirely free. Bio slides right with the username's natural
  # measured ink end + breathing_margin, only hitting the ceiling for
  # pathologically long names. The pre-Bug-A constraint where bio had to
  # leave room for HYPERWEAVE is gone for cellular.
  #
  # 410 chosen so VLLM-PROJECT (~130px natural at Orbitron 13/700/0.16em)
  # never clamps: 20 + 130 + 8 = 158, well under 410. Only usernames
  # exceeding ~386px natural ink hit the ceiling — none realistic.
  identity_x: 20
  bio_x: 410
  identity_padding: 2
  # Adaptive bio_x: bio sits at identity_x + identity_ink_width +
  # max(identity_breathing_margin, StatsLayout's 8px visible-gap floor).
  # For ELI64S (short, ~52px ink): bio at x=80. For VLLM-PROJECT
  # (~130px ink): bio at x=158 (no clamp, no squish).
  identity_breathing_margin: 8
  # Bug A folded HYPERWEAVE into the footer, eliminating the header-row
  # collision that bio_collision_clamp was defending against. With
  # HYPERWEAVE at y=221 there's no right-side header element to collide
  # with — bio can extend naturally up to the card edge.
  bio_collision_clamp: false
  # Identity measurement matches cellular-defs.j2 CSS exactly. Orbitron
  # 13/700/0.16em produces ~110px natural for 8-char names vs Inter 13/700/0's
  # 53px, so resolver measurement must use the rendered font.
  identity_font_family: Orbitron
  identity_font_size: 13
  identity_font_weight: 700
  identity_letter_spacing_em: 0.16
  identity_text_transform: uppercase
  # Genome-independent paradigm constants. Routed to template context as
  # named template variables (not raw hex) so the variant-blind hex gate
  # stays effective across all 6 cellular tones.
  streak_green: "#3FB950"
  mid_gray: "#6B7A88"
  hero_white: "#ECF2F8"
