app = "hyperweave"
primary_region = "iad"

[build]
  # .dockerignore excludes .git, so hatch-vcs can't read tags inside Docker and
  # falls back to SETUPTOOLS_SCM_PRETEND_VERSION (default 0.0.0). Pin the real
  # version here so /health, the FastAPI version=, and X-HW-* headers report it.
  # Bump per release, or pass `fly deploy --build-arg
  # SETUPTOOLS_SCM_PRETEND_VERSION=$(git describe --tags)`.
  [build.args]
    SETUPTOOLS_SCM_PRETEND_VERSION = "0.3.12"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    soft_limit = 20
    hard_limit = 40

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[checks]
  [checks.health]
    type = "http"
    port = 8080
    path = "/health"
    interval = "30s"
    timeout = "5s"
